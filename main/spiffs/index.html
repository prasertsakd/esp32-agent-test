<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32-S3 ChatBot</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  header .logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #e94560, #0f3460);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  header h1 { font-size: 16px; font-weight: 600; color: #fff; flex: 1; }
  #btn-reset {
    background: transparent;
    border: 1px solid #e94560;
    color: #e94560;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }
  #btn-reset:hover { background: #e94560; color: #fff; }

  /* ── Main layout ── */
  .container {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* ── Chat area ── */
  .chat-area {
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 80%;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: #0f3460;
    border-bottom-right-radius: 4px;
    color: #e0e0e0;
  }
  .msg.assistant .bubble {
    background: #16213e;
    border: 1px solid #0f3460;
    border-bottom-left-radius: 4px;
    color: #e0e0e0;
  }
  .msg-label {
    font-size: 11px;
    color: #666;
    margin-bottom: 3px;
    padding: 0 4px;
  }

  /* Typing indicator */
  .typing .bubble {
    background: #16213e;
    border: 1px solid #0f3460;
    border-bottom-left-radius: 4px;
    padding: 12px 16px;
  }
  .dots { display: flex; gap: 5px; align-items: center; }
  .dots span {
    width: 7px; height: 7px;
    background: #e94560;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* ── Input area ── */
  .input-area {
    padding: 12px 16px;
    background: #16213e;
    border-top: 1px solid #0f3460;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  #msg-input {
    flex: 1;
    background: #1a1a2e;
    border: 1px solid #0f3460;
    border-radius: 10px;
    padding: 10px 14px;
    color: #e0e0e0;
    font-size: 14px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    min-height: 44px;
    max-height: 120px;
    overflow-y: auto;
  }
  #msg-input:focus { border-color: #e94560; }
  #msg-input::placeholder { color: #555; }
  #btn-send {
    background: #e94560;
    border: none;
    border-radius: 10px;
    width: 44px;
    height: 44px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
    align-self: flex-end;
  }
  #btn-send:hover { background: #c73652; }
  #btn-send:active { transform: scale(0.95); }
  #btn-send svg { width: 20px; height: 20px; fill: white; }

  /* ── Side Panel ── */
  .gpio-panel {
    width: 200px;
    background: #16213e;
    border-left: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }
  .gpio-panel h2 {
    font-size: 12px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 12px 14px 8px;
    border-bottom: 1px solid #0f3460;
  }

  /* ── NeoPixel section ── */
  .neo-section {
    padding: 10px 12px;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
  }
  .neo-section h2 {
    padding: 0 0 8px 0;
    border-bottom: none;
  }
  .neo-swatch-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #neo-swatch {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #1a1a2e;
    border: 2px solid #0f3460;
    transition: background 0.4s, box-shadow 0.4s;
    flex-shrink: 0;
  }
  #neo-swatch.on {
    box-shadow: 0 0 12px 4px var(--neo-color, #ffffff44);
  }
  #neo-hex {
    font-size: 11px;
    color: #666;
    font-family: monospace;
  }

  .gpio-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .gpio-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #1a1a2e;
    border-radius: 8px;
    padding: 7px 10px;
    border: 1px solid #0f3460;
    transition: border-color 0.3s;
  }
  .gpio-item.high { border-color: #27ae60; }
  .gpio-pin {
    font-size: 13px;
    font-weight: 500;
    color: #aaa;
  }
  .gpio-pin span { font-size: 10px; color: #555; }
  .gpio-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 2px 7px;
    border-radius: 4px;
    background: #2c3e50;
    color: #7f8c8d;
    transition: background 0.3s, color 0.3s;
  }
  .gpio-item.high .gpio-badge {
    background: #1e8449;
    color: #a9dfbf;
  }

  /* ── Status indicator ── */
  #status {
    font-size: 11px;
    color: #555;
    padding: 4px 16px;
    text-align: center;
    flex-shrink: 0;
  }
  #status.connected { color: #27ae60; }
  #status.error { color: #e94560; }

  /* ── Responsive: hide GPIO panel on small screens ── */
  @media (max-width: 520px) {
    .gpio-panel { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">&#x1F916;</div>
  <h1>ESP32-S3 ChatBot</h1>
  <button id="btn-reset" onclick="resetChat()">Clear Chat</button>
</header>

<div class="container">
  <div class="chat-area">
    <div id="messages">
      <div class="msg assistant">
        <div class="msg-label">Assistant</div>
        <div class="bubble">สวัสดีครับ! ผมเป็น AI assistant ที่ควบคุม ESP32-S3 ได้
พิมพ์คำสั่งเช่น "เปิด pin 4" หรือ "toggle pin 7" ได้เลยครับ</div>
      </div>
    </div>
    <div id="status">Connecting...</div>
    <div class="input-area">
      <textarea id="msg-input" placeholder="พิมพ์ข้อความ... (Enter = ส่ง, Shift+Enter = ขึ้นบรรทัด)" rows="1"></textarea>
      <button id="btn-send" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <div class="gpio-panel">
    <!-- NeoPixel -->
    <div class="neo-section">
      <h2>NeoPixel</h2>
      <div class="neo-swatch-row">
        <div id="neo-swatch"></div>
        <span id="neo-hex">#000000</span>
      </div>
    </div>
    <!-- GPIO -->
    <h2>GPIO Status</h2>
    <div class="gpio-list" id="gpio-list">
      <div style="padding:12px;font-size:12px;color:#555;text-align:center">Loading...</div>
    </div>
  </div>
</div>

<script>
  const HOST = window.location.hostname;
  const WS_URL = `ws://${HOST}/ws`;

  let ws = null;
  let typingEl = null;

  function connect() {
    setStatus('Connecting...', '');
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      setStatus('Connected', 'connected');
    };

    ws.onclose = () => {
      setStatus('Disconnected — reconnecting...', 'error');
      setTimeout(connect, 3000);
    };

    ws.onerror = () => {
      setStatus('Connection error', 'error');
    };

    ws.onmessage = (evt) => {
      let data;
      try { data = JSON.parse(evt.data); } catch { return; }

      if (data.type === 'thinking') {
        showTyping();
      } else if (data.type === 'message') {
        hideTyping();
        appendMessage(data.role || 'assistant', data.text || '');
      } else if (data.type === 'gpio') {
        updateGpioPanel(data.pins || []);
      } else if (data.type === 'neopixel') {
        updateNeopixel(data);
      } else if (data.type === 'error') {
        hideTyping();
        appendMessage('assistant', '⚠️ Error: ' + (data.text || 'Unknown error'));
      }
    };
  }

  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    appendMessage('user', text);
    ws.send(JSON.stringify({ type: 'message', text }));
    input.value = '';
    input.style.height = '';
    input.focus();
  }

  function appendMessage(role, text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const label = role === 'user' ? 'You' : 'Assistant';
    div.innerHTML = `<div class="msg-label">${label}</div><div class="bubble">${escHtml(text)}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    if (typingEl) return;
    const msgs = document.getElementById('messages');
    typingEl = document.createElement('div');
    typingEl.className = 'msg assistant typing';
    typingEl.innerHTML = '<div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>';
    msgs.appendChild(typingEl);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideTyping() {
    if (typingEl) { typingEl.remove(); typingEl = null; }
  }

  function updateGpioPanel(pins) {
    const list = document.getElementById('gpio-list');
    list.innerHTML = '';
    pins.forEach(p => {
      const isHigh = p.state === 'HIGH';
      const item = document.createElement('div');
      item.className = `gpio-item${isHigh ? ' high' : ''}`;
      item.innerHTML = `
        <div class="gpio-pin">GPIO <span>#</span>${p.pin}</div>
        <div class="gpio-badge">${p.state}</div>`;
      list.appendChild(item);
    });
  }

  function updateNeopixel(data) {
    const swatch = document.getElementById('neo-swatch');
    const hexEl  = document.getElementById('neo-hex');
    const hex    = data.hex || '#000000';
    const isOn   = (data.r || 0) + (data.g || 0) + (data.b || 0) > 0;

    swatch.style.setProperty('--neo-color', hex + '88');
    swatch.style.background = isOn ? hex : '#1a1a2e';
    swatch.classList.toggle('on', isOn);
    hexEl.textContent = hex;
    hexEl.style.color = isOn ? hex : '#555';
  }

  function resetChat() {
    fetch('/api/reset', { method: 'POST' })
      .then(() => {
        document.getElementById('messages').innerHTML = '';
        appendMessage('assistant', 'ล้างประวัติการสนทนาแล้วครับ สามารถเริ่มใหม่ได้เลย');
      });
  }

  function setStatus(text, cls) {
    const el = document.getElementById('status');
    el.textContent = text;
    el.className = cls;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // Auto-resize textarea
  document.getElementById('msg-input').addEventListener('input', function() {
    this.style.height = '';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  // Enter to send, Shift+Enter for newline
  document.getElementById('msg-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  connect();
</script>
</body>
</html>
